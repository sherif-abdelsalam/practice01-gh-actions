name: Deploy Project
on: push

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Install Runtime
        uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build the Project
        run: npm run Build
        
      - name: Deploying
        run: echo "Deploying ...."